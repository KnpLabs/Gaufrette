name: Static analysis

on:
  push: ~

concurrency:
  cancel-in-progress: true
  group: ${{ github.repository }}/${{ github.workflow }}/${{ github.ref_name }}

jobs:

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mongodb-1.21.0, mbstring, fileinfo
          tools: composer:v2

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download dependencies
        run: |
          make require-all
          composer require --dev --no-update phpstan/phpstan:2.2.5
          composer update --no-interaction --prefer-dist

      - name: PHPStan
        run: |
          ./vendor/bin/phpstan --version
          ./vendor/bin/phpstan analyse


  php-cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mongodb-1.21.0, mbstring, fileinfo
          tools: composer:v2

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download dependencies
        run: |
          make require-all
          composer update --no-interaction --prefer-dist

      - name: PHP-CS-Fixer
        run: |
          ./vendor/bin/php-cs-fixer --version
          ./vendor/bin/php-cs-fixer fix --diff --dry-run --show-progress=none
